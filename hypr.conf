# Common Hyprland settings
exec-once = /home/prieyan/.config/hypr/scripts/wallpaper.sh init


# Monitor setup (explicit output name + 1.0 scale)
# Replace `eDP-1` with your output if different (check `hyprctl -j monitors`).
monitor = eDP-1,preferred,auto,1.0
gesture = 3, horizontal, workspace

# Application shortcuts
$term = kitty
$menu = rofi -show drun -config ~/.config/hypr/apps/rofi/config.rasi

bind = SUPER, T, exec, kitty
bind = SUPER, Return, exec, kitty
bind = SUPER, C, exec, code
bind = SUPER, W, exec, firefox
bind = SUPER, E, exec, dolphin
bind = SUPER SHIFT, W, exec, eww open --toggle wallpaper-center
bind = SUPER, R, exec, $menu
bind = SUPER, Q, killactive
bind = SUPER, F, fullscreen
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind = SUPER, Space, exec, $menu
bind = , XF86PowerOff, exec, /home/prieyan/.config/waybar/scripts/power-menu.sh menu

bind = SUPER, L, exec, hyprlock

# Notification controls (mako)
bind = SUPER, N, exec, makoctl dismiss
bind = SUPER SHIFT, N, exec, makoctl dismiss --all
bind = SUPER CTRL, N, exec, makoctl mode -t do-not-disturb

# Smart Brightness Control (Fn+F2 = Decrease, Fn+F3 = Increase)
bindel = , F2, exec, /home/prieyan/.config/hypr/scripts/brightness_control.sh down
bindel = , XF86MonBrightnessDown, exec, /home/prieyan/.config/hypr/scripts/brightness_control.sh down
bindel = , F3, exec, /home/prieyan/.config/hypr/scripts/brightness_control.sh up
bindel = , XF86MonBrightnessUp, exec, /home/prieyan/.config/hypr/scripts/brightness_control.sh up

# Volume Control (F5/XF86 = Mute, F6/XF86 = Volume Down, F7/XF86 = Volume Up)
bindel = , F6, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- || pactl set-sink-volume @DEFAULT_SINK@ -5% || amixer set Master 5%-
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- || pactl set-sink-volume @DEFAULT_SINK@ -5% || amixer set Master 5%-
bindel = , F7, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ || pactl set-sink-volume @DEFAULT_SINK@ +5% || amixer set Master 5%+
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ || pactl set-sink-volume @DEFAULT_SINK@ +5% || amixer set Master 5%+
bindel = , F5, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle || pactl set-sink-mute @DEFAULT_SINK@ toggle || amixer set Master toggle
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle || pactl set-sink-mute @DEFAULT_SINK@ toggle || amixer set Master toggle

# Lid close → LOCK ONLY. systemd-logind owns the actual suspend
# (HandleLidSwitch=suspend by default). Having Hyprland ALSO call
# `systemctl suspend` here double-triggers the suspend and races the
# resume → black screen. So we only lock; logind suspends; hypridle's
# before_sleep_cmd re-locks and after_sleep_cmd turns the panel back on.
bindl = , switch:on:Lid Switch, exec, loginctl lock-session
# Lid open → make sure the panel comes back on
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on

# Basic workspace switching
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER CTRL SHIFT, 1, movetoworkspace, 1
bind = SUPER CTRL SHIFT, 2, movetoworkspace, 2
bind = SUPER CTRL SHIFT, 3, movetoworkspace, 3
bind = SUPER CTRL SHIFT, 4, movetoworkspace, 4
bind = SUPER CTRL SHIFT, 5, movetoworkspace, 5
bind = SUPER CTRL SHIFT, 6, movetoworkspace, 6
bind = SUPER CTRL SHIFT, 7, movetoworkspace, 7
bind = SUPER CTRL SHIFT, 8, movetoworkspace, 8
bind = SUPER CTRL SHIFT, 9, movetoworkspace, 9
bind = SUPER CTRL SHIFT, 0, movetoworkspace, 10
bind = SUPER, TAB, focuswindow, next
bind = SUPER SHIFT, TAB, focuswindow, previous
bind = SUPER, mouse_up, workspace, e-1
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER CTRL SHIFT, R, exec, hyprctl reload

# Smooth animations
animations {
  enabled = yes

  bezier = smooth, 0.25, 0.1, 0.25, 1.0
  bezier = swift, 0.4, 0.0, 0.2, 1.0
  bezier = soft, 0.16, 1.0, 0.30, 1.0
  bezier = pop, 0.34, 1.32, 0.64, 1.0

  animation = windows, 1, 4, pop, popin 92%
  animation = windowsIn, 1, 4, pop, popin 92%
  animation = windowsOut, 1, 3, swift, popin 92%
  animation = windowsMove, 1, 4, soft
  animation = border, 1, 8, smooth
  animation = borderangle, 1, 30, smooth, loop
  animation = fade, 1, 3, smooth
  animation = fadeIn, 1, 3, smooth
  animation = fadeOut, 1, 3, swift
  animation = workspaces, 1, 5, soft, slide
  animation = specialWorkspace, 1, 5, soft, slidevert
  animation = layers, 1, 3, soft, slide
  animation = layersIn, 1, 3, soft, slide
  animation = layersOut, 1, 3, swift, slide
}

general {
  gaps_in = 4
  gaps_out = 0
  border_size = 1
  col.active_border = rgba(ffffffcc)
  col.inactive_border = rgba(2a2a2a88)
}

# Wayland and optional NVIDIA environment helpers
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland
env = MOZ_ENABLE_WAYLAND,1
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# Glassy UI settings
decoration {
  rounding = 12
  blur {
    enabled = yes
    size = 8
    passes = 2
    new_optimizations = yes
    ignore_opacity = yes
  }
  active_opacity = 0.95
  inactive_opacity = 0.88
}

# Apply blur to eww bar
blurls = eww-bar
layerrule {
  name = eww-bar
  ignore_alpha = 0.2
}

# Apply blur to Rofi
layerrule {
  name = rofi
  blur = true
  ignore_alpha = 0.2
}


# Calendar Center (Top Left)
windowrule = match:class ^(.*CalendarCenter.*)$, float on
windowrule = match:class ^(.*CalendarCenter.*)$, size 380 400
windowrule = match:class ^(.*CalendarCenter.*)$, move 10 48
windowrule = match:class ^(.*CalendarCenter.*)$, animation slide top
windowrule = match:title ^(Calendar Center)$, float on
windowrule = match:title ^(Calendar Center)$, size 380 400
windowrule = match:title ^(Calendar Center)$, move 10 48
windowrule = match:title ^(Calendar Center)$, animation slide top

# Wallpaper Center (Top Right)
windowrule = match:class ^(.*WallpaperCenter.*)$, float on
windowrule = match:class ^(.*WallpaperCenter.*)$, size 560 480
windowrule = match:class ^(.*WallpaperCenter.*)$, move 100%-w-10 48
windowrule = match:class ^(.*WallpaperCenter.*)$, animation slide top

# Bluetooth Manager & Applet (Top Right)
windowrule = match:class ^(.*[Bb]lueman.*)$, float on
windowrule = match:class ^(.*[Bb]lueman.*)$, size 340 500
windowrule = match:class ^(.*[Bb]lueman.*)$, move 100%-w-10 48
windowrule = match:class ^(.*[Bb]lueman.*)$, animation slide top

# Network Connection Editor & Applet (Top Right)
windowrule = match:class ^(.*[Nn]m-.*)$, float on
windowrule = match:class ^(.*[Nn]m-.*)$, size 340 500
windowrule = match:class ^(.*[Nn]m-.*)$, move 100%-w-10 48
windowrule = match:class ^(.*[Nn]m-.*)$, animation slide top

# Network Center (Top Right)
windowrule = match:class ^(.*[Nn]etwork.*[Cc]enter.*)$, float on
windowrule = match:class ^(.*[Nn]etwork.*[Cc]enter.*)$, size 420 560
windowrule = match:class ^(.*[Nn]etwork.*[Cc]enter.*)$, move 100%-w-10 48
windowrule = match:class ^(.*[Nn]etwork.*[Cc]enter.*)$, animation slide top
windowrule = match:title ^(Network Center)$, float on
windowrule = match:title ^(Network Center)$, size 420 560
windowrule = match:title ^(Network Center)$, move 100%-w-10 48
windowrule = match:title ^(Network Center)$, animation slide top

# Power Center (Top Right)
windowrule = match:class ^(.*PowerCenter.*)$, float on
windowrule = match:class ^(.*PowerCenter.*)$, size 380 280
windowrule = match:class ^(.*PowerCenter.*)$, move 100%-w-10 48
windowrule = match:class ^(.*PowerCenter.*)$, animation slide top
windowrule = match:title ^(Power Center)$, float on
windowrule = match:title ^(Power Center)$, size 380 280
windowrule = match:title ^(Power Center)$, move 100%-w-10 48
windowrule = match:title ^(Power Center)$, animation slide top

# Spotify Center (Top Left, under the now-playing module)
windowrule = match:class ^(.*SpotifyCenter.*)$, float on
windowrule = match:class ^(.*SpotifyCenter.*)$, size 340 470
windowrule = match:class ^(.*SpotifyCenter.*)$, move 10 48
windowrule = match:class ^(.*SpotifyCenter.*)$, animation slide top
windowrule = match:title ^(Spotify Center)$, float on
windowrule = match:title ^(Spotify Center)$, size 340 470
windowrule = match:title ^(Spotify Center)$, move 10 48
windowrule = match:title ^(Spotify Center)$, animation slide top









# Disable experimental color management to restore full physical screen brightness (prevents SDR clamping to 80 nits)
render {
  cm_enabled = false
}
