# Minimal Hyprland entry point
# Sources the shared Hyprland config and starts common desktop helpers.

source = /home/prieyan/.config/hypr/hypr.conf

# Common autostart helpers
exec-once = /usr/bin/waybar
exec-once = hyprpaper
exec-once = /home/prieyan/.config/hypr/scripts/wallpaper.sh init
# Start the hypridle daemon for locking and sleep management
exec-once = hypridle
