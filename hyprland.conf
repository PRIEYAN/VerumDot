# Minimal Hyprland entry point
# Sources the shared Hyprland config and starts common desktop helpers.

source = $HOME/.config/hypr/hypr.conf

# Common autostart helpers
exec-once = eww daemon
exec-once = eww open bar
# Seed the performance-mode widget from the current power profile
exec-once = $HOME/.config/hypr/scripts/performance-mode.sh init
# Seed the GPU-mode widget from the current supergfxctl mode
exec-once = $HOME/.config/hypr/scripts/gpu-mode.sh init
exec-once = hyprpaper
exec-once = $HOME/.config/hypr/scripts/wallpaper.sh init
# Start the hypridle daemon for locking and sleep management
exec-once = hypridle
# Notification daemon (top-right)
exec-once = mako --config $HOME/.config/hypr/apps/mako/config
exec-once = nm-applet --indicator
exec-once = blueman-applet
