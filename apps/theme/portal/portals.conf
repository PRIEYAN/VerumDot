# Pin the FileChooser to the GTK backend. Without this, the GNOME portal can
# claim it and render the washed-out light "Open Folder" dialog seen in VS Code
# and in download destination pickers.
#
# Symlinked to ~/.config/xdg-desktop-portal/portals.conf, since
# xdg-desktop-portal only reads that XDG path.

[preferred]
default=hyprland;gtk
org.freedesktop.impl.portal.FileChooser=gtk
org.freedesktop.impl.portal.Settings=gtk
org.freedesktop.impl.portal.Screenshot=hyprland
org.freedesktop.impl.portal.ScreenCast=hyprland
