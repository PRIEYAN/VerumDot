# Pure-black qt5ct/qt6ct color scheme: black background, white text,
# white selection with black text.
# Symlinked into ~/.config/qt5ct/colors/ and ~/.config/qt6ct/colors/.
#
# Color order (21 roles): WindowText, Button, Light, Midlight, Dark, Mid,
# Text, BrightText, ButtonText, Base, Window, Shadow, Highlight,
# HighlightedText, Link, LinkVisited, AlternateBase, NoRole, ToolTipBase,
# ToolTipText, PlaceholderText.
[ColorScheme]
active_colors=#ffffffff, #ff000000, #ff2a2a2a, #ff1a1a1a, #ff000000, #ff141414, #ffffffff, #ffffffff, #ffffffff, #ff000000, #ff000000, #ff000000, #ffffffff, #ff000000, #ffffffff, #ffcccccc, #ff0a0a0a, #ffffffff, #ff000000, #ffffffff, #80ffffff
disabled_colors=#ff707070, #ff000000, #ff2a2a2a, #ff1a1a1a, #ff000000, #ff141414, #ff707070, #ffffffff, #ff707070, #ff000000, #ff000000, #ff000000, #ff3a3a3a, #ff909090, #ff909090, #ff707070, #ff0a0a0a, #ffffffff, #ff000000, #ffffffff, #80808080
inactive_colors=#ffffffff, #ff000000, #ff2a2a2a, #ff1a1a1a, #ff000000, #ff141414, #ffffffff, #ffffffff, #ffffffff, #ff000000, #ff000000, #ff000000, #ff3a3a3a, #ffffffff, #ffffffff, #ffcccccc, #ff0a0a0a, #ffffffff, #ff000000, #ffffffff, #80ffffff
