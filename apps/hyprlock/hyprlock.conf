# Hyprlock Glassy Theme

general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = $HOME/Pictures/Wallpapers/roblox.png  # Use the cached wallpaper
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2 # 0 disables blurring
    blur_size = 1
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(0, 0, 0, 0.8)
    font_size = 120
    font_family = JetBrains Mono ExtraBold
    position = 0, 40
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgba(255, 255, 255, 0.8)
    font_size = 24
    font_family = JetBrains Mono
    position = 0, -60
    halign = center
    valign = center
}

#placeholder
label {
    monitor =
    text = mogger
    color = rgba(0, 0, 0, 0.8)
    font_size = 24
    font_family = Impact 
    position = 0, -100
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0.2)
    inner_color = rgba(255, 230, 0, 0.46)
    font_color = rgb(200, 200, 200)
    fade_on_empty = true
    placeholder_text = <i>Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    rounding = 20 # Curved border
    position = 0, -200
    halign = center
    valign = center
}

# SHUTDOWN BUTTON (Label)
label {
    monitor =
    text = ⏻
    color = rgba(255, 255, 255, 0.8)
    font_size = 30
    font_family = JetBrains Mono
    position = 0, -300
    halign = center
    valign = center
}